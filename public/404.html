<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>João Pedro Luvisari Severiano – Portfólio</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirects all 404s to the root so React Router (or hash routing) handles them
    var segmentCount = 1; // number of path segments in the repo name (Portfolio = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>Redirecionando...</p>
</body>
</html>
